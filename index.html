  <head>

    <meta name="description" content="Loop any section of a YouTube video endlessly. Paste a link, set start and end times, adjust playback speed, and share your clips with anyone.">

    <!-- Google Analytics -->

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L59SC5VW14');
    </script>

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ytlooper.vercel.app/" />
    <meta property="og:title" content="YouTube Looper - Loop Any Section of a Video" />
    <meta property="og:description" content="Loop any section of a YouTube video endlessly. Paste a link, set start and end times, adjust playback speed, and share your clips with anyone." />
    <meta property="og:image" content="https://ytlooper.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YouTube Looper - Loop Any Section of a Video" />
    <meta name="twitter:description" content="Loop any section of a YouTube video endlessly. Paste a link, set start and end times, adjust playback speed, and share your clips with anyone." />
    <meta name="twitter:image" content="https://ytlooper.vercel.app/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "YouTube Looper",
      "url": "https://ytlooper.vercel.app/",
      "description": "Loop any section of a YouTube video endlessly. Paste a link, set start and end times, adjust playback speed, and share your clips with anyone.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com https://www.googletagmanager.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self' https://www.youtube.com https://s.ytimg.com https://www.google-analytics.com https://analytics.google.com; media-src 'self' https: http:;">

    <!-- Fonts: preconnect + non-render-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>

    <style>
      /* Font fallback to reduce CLS during font swap */
      @font-face {
        font-family: 'Inter Fallback';
        src: local('Arial');
        ascent-override: 90%;
        descent-override: 22%;
        line-gap-override: 0%;
        size-adjust: 107%;
      }

      /* Fix viewport and scrollbar issues */
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
      }
      
      #root {
        height: 100vh;
        width: 100%;
        overflow: hidden;
        position: relative;
      }


      /* Fix YouTube iframe white space */
      #player iframe {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        border: none !important;
        outline: none !important;
      }

      #player {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
      }

      /* Remove any default margins/padding that might cause white space */
      #player * {
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }
      
      /* Prevent horizontal scroll */
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
